<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Piano Race - P-45 Battle</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.6/dist/iife/webmidi.iife.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; text-align: center; }
        .race-track { display: flex; justify-content: space-around; margin-top: 20px; }
        .player-lane { 
            width: 45%; background: #1e1e1e; padding: 20px; border-radius: 15px;
            border: 3px solid #333; transition: border-color 0.3s;
        }
        #staff-p1, #staff-p2 { background: white; border-radius: 8px; margin: 15px 0; min-height: 120px; }
        .score-board { font-size: 2rem; font-weight: bold; margin: 20px 0; }
        .timer { font-size: 1.5rem; color: #f1c40f; }
        .winner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .controls, .metronome-controls { margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; display: inline-block; }
    
    .flash-correct { background: #2ecc71 !important; transition: 0.1s; }
.flash-wrong { background: #e74c3c !important; transition: 0.1s; }
.next-note-hint { font-size: 1.2rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🏆 Zongora Párbaj</h1>
    <div class="timer">Idő: <span id="time-display">0.00</span>s</div>
    
    <div class="race-track">
        <div id="lane-1" class="player-lane player-1">
            <h2>Kék Játékos (C4 alatt)</h2>
            <div id="staff-p1"></div>
            <div class="score-board">Pont: <span id="score-1">0</span></div>
            <div id="feedback-1">-</div>
        </div>

        <div id="lane-2" class="player-lane player-2">
            <h2>Piros Játékos (C4 felett)</h2>
            <div id="staff-p2"></div>
            <div class="score-board">Pont: <span id="score-2">0</span></div>
            <div id="feedback-2">-</div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="midi-upload" accept=".mid,.midi">
        <button onclick="startRace()" id="start-btn" disabled>Verseny Indítása!</button>
    </div>

    <button onclick="hardMode = !hardMode; alert('Hard Mode: ' + (hardMode ? 'BE' : 'KI'))">
    Hard Mode (Betűk elrejtése)
</button>

    <div class="metronome-controls">
        <label>Tempó (BPM): </label>
        <input type="number" id="bpm-input" value="100" min="40" max="240">
        <div id="beat-indicator" style="width:20px; height:20px; border-radius:50%; background:gray; display:inline-block; margin-left:10px;"></div>
    </div>

    <div id="winner-screen" class="winner-overlay">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()">Új játék</button>
    </div>

    <script>
        let lastInputTime1 = 0;
let lastInputTime2 = 0;
const debounceInterval = 50; // Ezredmásodperc (50ms)
let songNotes = [];
let p1Index = 0, p2Index = 0;
let p1Score = 0, p2Score = 0;
let raceActive = false;
let startTime;
let audioCtx = null;
let currentBeat = 0;
let nextNoteTime = 0.0;
let timerID = null;

// --- MIDI FÁJL BETÖLTÉSE (Ez hiányzott!) ---
document.getElementById('midi-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (event) => {
        const midi = new Midi(event.target.result);
        // Megkeressük az első sávot, amiben vannak hangjegyek
        const track = midi.tracks.find(t => t.notes.length > 0);
        if (track) {
            songNotes = track.notes;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('status-info')?.remove();
            // Kirajzoljuk az első hangokat kezdésnek
            drawNote("staff-p1", songNotes[0].name);
            drawNote("staff-p2", songNotes[0].name);
            alert("MIDI betöltve! Nyomhatod a Startot.");
        }
    };
    reader.readAsArrayBuffer(file);
});

let hardMode = false; // Ha true, eltűnnek a betűk

function drawNote(divId, noteName) {
    const container = document.getElementById(divId);
    container.innerHTML = "";
    
    // 1. Kotta rajzolása (VexFlow)
    const renderer = new Vex.Flow.Renderer(container, Vex.Flow.Renderer.Backends.SVG);
    renderer.resize(300, 150); // Kicsit magasabb, hogy elférjen a betű
    const context = renderer.getContext();
    const stave = new Vex.Flow.Stave(10, 0, 280);
    stave.addClef("treble").setContext(context).draw();
    
    const pitch = noteName.toLowerCase().replace(/(\d+)/, '/$1');
    const note = new Vex.Flow.StaveNote({ keys: [pitch], duration: "q" });
    if(noteName.includes("#")) note.addModifier(new Vex.Flow.Accidental("#"), 0);

    Vex.Flow.Formatter.FormatAndDraw(context, stave, [note]);

    // 2. Hangnév kiírása (Segítség)
    if (!hardMode) {
        const label = document.createElement("div");
        label.style.fontSize = "40px";
        label.style.fontWeight = "bold";
        label.style.color = "#f1c40f"; // Szép sárga, jól látszik
        label.style.marginTop = "-20px";
        // Csak a betűt írjuk ki, az oktávszámot (pl. 4) levágjuk
        label.innerText = noteName.replace(/\d+/, ""); 
        container.appendChild(label);
    }
}

// --- VERSENY INDÍTÁSA ---
async function startRace() {
    if (songNotes.length === 0) return;
    if (audioCtx === null) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    document.getElementById('start-btn').disabled = true;
    
    // Beszámolás
    currentBeat = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    scheduler(); 

    const bpm = document.getElementById('bpm-input').value;
    const msPerBeat = (60 / bpm) * 1000;
    
    setTimeout(() => {
        p1Index = 0; p2Index = 0;
        p1Score = 0; p2Score = 0;
        raceActive = true;
        startTime = performance.now();
        updateTimer();
    }, msPerBeat * 4); 
}

// --- MIDI INPUT ÉS LOGIKA ---
WebMidi.enable().then(() => {
    if (WebMidi.inputs.length > 0) {
        const input = WebMidi.inputs[0];
        input.addListener("noteon", e => {
            if (!raceActive) return;

            const now = performance.now();
            const player = e.note.number < 60 ? 1 : 2;

            // Debouncing ellenőrzés játékosonként
            if (player === 1) {
                if (now - lastInputTime1 < debounceInterval) return;
                lastInputTime1 = now;
            } else {
                if (now - lastInputTime2 < debounceInterval) return;
                lastInputTime2 = now;
            }

            // Ha túl kicsi a velocity (véletlen érintés), hagyjuk figyelmen kívül
            if (e.rawVelocity < 10) return; 

            handleInput(player, e.note.identifier, e.rawVelocity);
        });
    }
});

function handleInput(player, playedNote, velocity) {
    if (!raceActive) return;
    const lane = document.getElementById(`lane-${player}`);
    const currentIndex = player === 1 ? p1Index : p2Index;
    const targetNote = songNotes[currentIndex].name;

    if (playedNote === targetNote) {
        // HELYES ÜTÉS
        lane.classList.add('flash-correct');
        setTimeout(() => lane.classList.remove('flash-correct'), 150);
        
        // Pontozás: sebesség (velocity) + bónusz a gyorsaságért
        const points = Math.round(velocity * 1.5 + 50);
        
        if (player === 1) {
            p1Score += points;
            p1Index++;
            document.getElementById('score-1').innerText = p1Score;
            if (p1Index < songNotes.length) drawNote("staff-p1", songNotes[p1Index].name);
        } else {
            p2Score += points;
            p2Index++;
            document.getElementById('score-2').innerText = p2Score;
            if (p2Index < songNotes.length) drawNote("staff-p2", songNotes[p2Index].name);
        }
    } else {
        // ROSSZ ÜTÉS
        lane.classList.add('flash-wrong');
        setTimeout(() => lane.classList.remove('flash-wrong'), 150);
    }
}

function showWinner() {
    const screen = document.getElementById('winner-screen');
    const text = document.getElementById('winner-text');
    screen.style.display = "flex";
    text.innerText = p1Score > p2Score ? "KÉK JÁTÉKOS GYŐZÖTT! 🏆" : "PIROS JÁTÉKOS GYŐZÖTT! 🏆";
}

// --- METRONÓM ÉS IDŐZÍTŐ ---
function scheduler() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const bpm = document.getElementById('bpm-input').value;
    const secondsPerBeat = 60.0 / bpm;
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playMetronomeClick(currentBeat, nextNoteTime);
        nextNoteTime += secondsPerBeat;
        currentBeat++;
    }
    timerID = setTimeout(scheduler, 25);
}

function playMetronomeClick(beat, time) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = (beat % 4 === 0) ? 880 : 440;
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.1);
    setTimeout(() => {
        const dot = document.getElementById('beat-indicator');
        if(dot) {
            dot.style.background = (beat % 4 === 0) ? "#f1c40f" : "#2ecc71";
            setTimeout(() => dot.style.background = "gray", 100);
        }
    }, (time - audioCtx.currentTime) * 1000);
}

function updateTimer() {
    if (!raceActive) return;
    const elapsed = (performance.now() - startTime) / 1000;
    document.getElementById('time-display').innerText = elapsed.toFixed(2);
    requestAnimationFrame(updateTimer);
}
    </script>
</body>
</html>
