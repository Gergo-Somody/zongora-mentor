<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>P-45 Piano Mentor v9.0 - Teljes Kotka</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.6/dist/iife/webmidi.iife.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        #sheet-image-container { position: fixed; top: 10px; left: 10px; width: 300px; border: 2px solid #444; background: #fff; padding: 5px; border-radius: 8px; z-index: 100; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #sheet-image-container img { width: 100%; height: auto; border-radius: 4px; }

        #ui-container { max-width: 1200px; margin: 0 auto; }
        
        /* A kotta terület görgethető, ha túl hosszú lenne */
        #staff-scroll-container { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin: 20px auto; 
            width: 1000px; 
            max-height: 70vh; 
            overflow-y: auto; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        .controls { background: #222; padding: 12px; border-radius: 10px; display: inline-block; margin: 5px; border: 1px solid #444; }
        button { padding: 10px 18px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; margin: 0 3px; }
        .btn-play { background: #3498db; color: white; } 
        .btn-start { background: #2ecc71; color: white; } 
        .btn-stop { background: #e74c3c; color: white; } 
        
        #msg { font-size: 2rem; font-weight: bold; margin: 10px; color: #3498db; height: 3rem; }
        #countdown { font-size: 8rem; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f1c40f; display: none; z-index: 200; font-weight: bold; text-shadow: 4px 4px 15px black; }
    </style>
</head>
<body>

<div id="sheet-image-container"><img id="target-sheet-img" src="" alt="Eredeti"></div>
<div id="countdown">3</div>

<div id="ui-container">
    <h1>🎹 P-45 ZaliZenegép</h1>

    <div class="controls">
        <select id="song-select" onchange="loadSelectedSong()">
            <option value="">-- Válassz dalt --</option>
            <option value="midi/tempo/boci_boci.mid">1. Boci-boci tarka</option>
            <option value="midi/tempo/suss_fel_nap.mid">2. Süss fel nap</option>
            <option value="midi/tempo/hull_a_pelyhes.mid">3. Hull a pelyhes fehér hó</option>
            <option value="midi/tempo/star_wars.mid">4. Star Wars Theme</option>
            <option value="midi/tempo/oromoda.mid">5. Örömóda</option>
            <option value="midi/tempo/hull_a_szilva.mid">7. Hull a szilva</option>
            <option value="midi/tempo/megy_a_gozos.mid">8. Megy a gőzös</option>
            <option value="midi/tempo/harry_potter_hedwig_3_8.mid">9. Harry Potter</option>
               <option value="midi/tempo/elmentem_a_piacra.mid">10. Elmentem a piacra</option>
        </select>
        <label> BPM: <input type="number" id="bpm" value="80" style="width: 50px;"></label>
        <button class="btn-play" id="btn-demo" disabled onclick="playOnlyDemo()">MINTA (DEMO)</button>
        <button class="btn-start" id="btn-game" disabled onclick="startGame()">JÁTÉK (TESZT)</button>
        <button class="btn-stop" onclick="stopEverything()">STOP</button>
    </div>

    <div id="msg">Tölts be egy dalt!</div>
    
    <div id="staff-scroll-container">
        <div id="staff"></div>
    </div>
</div>

<script>
const VF = Vex.Flow;
const freqs = { "C3":130.81, "D3":146.83, "E3":164.81, "F3":174.61, "G3":196.00, "A3":220.00, "B3":246.94, "C4": 261.63, "D4": 293.66, "E4": 329.63, "F4": 349.23, "G4": 392.00, "A4": 440.00, "B4": 493.88, "C5": 523.25 };

let songNotes = [], currentIndex = 0, bpm = 80;
let isRunning = false, raceActive = false, audioCtx = null;
let timeSignature = { num: 4, den: 4 };

// MIDI beolvasás
async function loadSelectedSong() {
    const path = document.getElementById('song-select').value;
    if (!path) return;

    // Ütem kiolvasása név alapján
    const match = path.match(/(\d+)_(\d+)\.mid$/);
    timeSignature = match ? { num: parseInt(match[1]), den: parseInt(match[2]) } : { num: 4, den: 4 };

    // Kép kezelése
    const imgEl = document.getElementById('target-sheet-img');
    imgEl.src = path.replace('.mid', '.png');
    imgEl.onload = () => document.getElementById('sheet-image-container').style.display = "block";

    try {
        const response = await fetch(path);
        const midi = new Midi(await response.arrayBuffer());
        const track = midi.tracks.find(t => t.notes.length > 0);
        if (track) {
            songNotes = track.notes;
            document.querySelectorAll('#btn-demo, #btn-game').forEach(b => b.disabled = false);
            document.getElementById('msg').innerText = "Kotta betöltve!";
            currentIndex = -1; // Kezdetben nincs kijelölve semmi
            drawFullStaff();
        }
    } catch (e) { document.getElementById('msg').innerText = "Hiba a MIDI betöltésekor!"; }
}

function drawFullStaff() {
    const container = document.getElementById('staff');
    container.innerHTML = "";
    
    const notesPerLine = 12;
    const lineCount = Math.ceil(songNotes.length / notesPerLine);
    
    const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
    // Megnöveltük a sorok közti helyet 150 -> 200-ra
    renderer.resize(950, lineCount * 200); 
    const context = renderer.getContext();

    for (let line = 0; line < lineCount; line++) {
        // A 40 -> 80-ra módosítva: ez ad helyet a magas hangok betűinek
        const stave = new VF.Stave(50, (line * 180) + 60, 850); 
        
        if (line === 0) {
            stave.addClef("treble").addTimeSignature(`${timeSignature.num}/${timeSignature.den}`);
        }
        stave.setContext(context).draw();

        const startIdx = line * notesPerLine;
        const endIdx = Math.min(startIdx + notesPerLine, songNotes.length);
        const lineNotes = [];

        for (let i = startIdx; i < endIdx; i++) {
            const n = songNotes[i];
            const pitch = n.name.toLowerCase().replace(/(\d+)/, '/$1');
            const dur = (n.duration < 0.25) ? "8" : "q";
            const vexNote = new VF.StaveNote({ keys: [pitch], duration: dur });
            
            // Annotation (betűjel) pozíciója fixálva
            vexNote.addModifier(new VF.Annotation(n.name.replace(/\d+/,"")).setFont("Arial", 14, "bold"), 0);
            
            if (n.name.includes("#")) vexNote.addModifier(new VF.Accidental("#"), 0);
            
            if (i === currentIndex) {
                vexNote.setStyle({ fillStyle: "#3498db", strokeStyle: "#3498db" });
                // --- AUTO-SCROLL LOGIKA ---
                scrollToActiveLine(line);
            }
            lineNotes.push(vexNote);
        }

        if (lineNotes.length > 0) {
            const voice = new VF.Voice({ num_beats: lineNotes.length, beat_value: 4 }).setStrict(false);
            voice.addTickables(lineNotes);
            new VF.Formatter().joinVoices([voice]).format([voice], 750);
            voice.draw(context, stave);
        }
    }
}

// Hang és Játék logika
function playSynthNote(n) {
    if (!audioCtx) audioCtx = new AudioContext();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freqs[n] || 440;
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

async function playOnlyDemo() {
    isRunning = true; raceActive = false;
    bpm = document.getElementById('bpm').value;
    for (let i = 0; i < songNotes.length; i++) {
        if (!isRunning) return;
        currentIndex = i;
        drawFullStaff();
        playSynthNote(songNotes[i].name);
        await new Promise(r => setTimeout(r, (60000 / bpm) * (songNotes[i].duration < 0.25 ? 0.5 : 1)));
    }
    stopEverything();
}

async function startGame() {
    isRunning = true;
    bpm = document.getElementById('bpm').value;
    const cd = document.getElementById('countdown');
    cd.style.display = "block";
    for(let i=3; i>=0; i--) {
        cd.innerText = i || "RAJT!";
        await new Promise(r => setTimeout(r, 1000));
    }
    cd.style.display = "none";
    currentIndex = 0;
    raceActive = true;
    drawFullStaff();
    document.getElementById('msg').innerText = "MEHET!";
}

function stopEverything() {
    isRunning = false; raceActive = false;
    document.getElementById('countdown').style.display = "none";
    currentIndex = -1;
    drawFullStaff();
}
function scrollToActiveLine(lineIndex) {
    const scrollContainer = document.getElementById('staff-scroll-container');
    const lineHeight = 180; // Megegyezik a rajzolásnál használt eltolással
    const targetY = lineIndex * lineHeight;
    
    // Finom görgetés az aktuális sorhoz
    scrollContainer.scrollTo({
        top: targetY,
        behavior: 'smooth'
    });
}

WebMidi.enable().then(() => {
    if (WebMidi.inputs.length > 0) {
        WebMidi.inputs[0].addListener("noteon", e => {
            if (!raceActive) return;
            if (e.note.identifier === songNotes[currentIndex].name) {
                currentIndex++;
                drawFullStaff(); // Ez frissíti a színt és a görgetést
                if (currentIndex >= songNotes.length) {
                    document.getElementById('msg').innerText = "GRATULÁLOK! 🎉";
                    raceActive = false;
                }
            }
        });
    }
});
</script>
</body>
</html>
