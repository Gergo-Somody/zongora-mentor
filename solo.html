<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zongora Oktató - Yamaha P-45</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.6/dist/iife/webmidi.iife.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #app-container {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #3d3d3d;
            border-radius: 10px;
        }

        #staff-container {
            background: white; /* A kottának fehér háttér kell a láthatósághoz */
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 150px;
        }

        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        #feedback-area {
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .note-list-container {
            text-align: left;
            background: #3d3d3d;
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .active-note {
            color: #2ecc71;
            font-weight: bold;
            text-decoration: underline;
        }

        .velocity-meter {
            width: 100%;
            height: 20px;
            background: #444;
            border-radius: 10px;
            margin-top: 10px;
        }

        #velocity-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 10px;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <h1>🎹 P-45 Zongora Mentor</h1>

        <div class="controls">
            <label for="midi-upload">MIDI Fájl betöltése: </label>
            <input type="file" id="midi-upload" accept=".mid,.midi">
        </div>

        <div id="connection-status">MIDI keresése...</div>

        <div id="staff-container"></div>

        <div class="status-panel">
            <div class="note-list-container">
                <strong>Dallam sorrend:</strong>
                <ul id="note-sequence">
                    <li>Tölts be egy fájlt...</li>
                </ul>
            </div>
            
            <div id="feedback-area">
                <span id="check-mark"></span>
            </div>
        </div>

        <p>Leütés ereje (Velocity): <span id="velo-text">0</span></p>
        <div class="velocity-meter">
            <div id="velocity-fill"></div>
        </div>
    </div>

    <script>
   // --- 1. GLOBÁLIS VÁLTOZÓK ÉS ÁLLAPOT ---
let songNotes = [];      // A MIDI fájlból beolvasott hangjegyek
let currentIndex = 0;    // Hol tartunk a dalban
const VexFlow = Vex.Flow; // Rövidítés a kottarajzoláshoz

// --- 2. MIDI FÁJL FELDOLGOZÁSA ---
document.getElementById('midi-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (event) => {
        const midi = new Midi(event.target.result);
        
        // Az első olyan sávot keressük, amiben vannak hangjegyek
        const track = midi.tracks.find(t => t.notes.length > 0);
        
        if (track) {
            songNotes = track.notes;
            currentIndex = 0;
            console.log("Betöltött hangok száma:", songNotes.length);
            
            updateUI();
            drawStaff(songNotes[currentIndex].name);
        } else {
            alert("A MIDI fájl nem tartalmaz felismerhető hangjegyeket.");
        }
    };
    reader.readAsArrayBuffer(file);
});

// --- 3. KOTTA RAJZOLÁSA (VexFlow) ---
function drawStaff(noteName) {
    const container = document.getElementById('staff-container');
    container.innerHTML = ""; // Előző kotta törlése

    const renderer = new VexFlow.Renderer(container, VexFlow.Renderer.Backends.SVG);
    renderer.resize(400, 200);
    const context = renderer.getContext();

    // Kottavonal létrehozása
    const stave = new VexFlow.Stave(50, 40, 300);
    stave.addClef("treble").setContext(context).draw();

    // VexFlow formátum konverzió: pl. "C4" -> "c/4"
    const pitch = noteName.toLowerCase().replace(/(\d+)/, '/$1');
    
    // Hangjegy létrehozása
    const note = new VexFlow.StaveNote({
        keys: [pitch],
        duration: "q", // negyed hang
        auto_stem: true
    });

    // Ha van kereszt vagy bé (pl. C#4), azt külön hozzá kell adni
    if (noteName.includes("#")) {
        note.addModifier(new VexFlow.Accidental("#"), 0);
    } else if (noteName.includes("b")) {
        note.addModifier(new VexFlow.Accidental("b"), 0);
    }

    // Hangjegy elhelyezése a kottán
    const voice = new VexFlow.Voice({ num_beats: 1, beat_value: 4 });
    voice.addTickables([note]);

    new VexFlow.Formatter().joinVoices([voice]).format([voice], 200);
    voice.draw(context, stave);
}

// --- 4. YAMAHA P-45 (MIDI INPUT) KEZELÉSE ---
WebMidi.enable().then(() => {
    const statusText = document.getElementById('connection-status');

    if (WebMidi.inputs.length > 0) {
        // Megkeressük a P-45-öt, vagy az első elérhető eszközt
        const piano = WebMidi.inputs.find(i => i.name.includes("P-45")) || WebMidi.inputs[0];
        statusText.innerText = "Hangszer csatlakoztatva: " + piano.name;
        statusText.style.color = "#2ecc71";

        piano.addListener("noteon", e => {
            const playedNote = e.note.identifier; // pl. "C4"
            const velocity = Math.round(e.rawVelocity); // 0-127
            
            handleInput(playedNote, velocity);
        });
    } else {
        statusText.innerText = "Nincs MIDI eszköz. Csatlakoztasd a P-45-öt!";
        statusText.style.color = "#e74c3c";
    }
}).catch(err => console.error("WebMidi hiba:", err));

// --- 5. LOGIKA: ELLENŐRZÉS ÉS TOVÁBBLÉPÉS ---
function handleInput(playedNote, velocity) {
    if (songNotes.length === 0 || currentIndex >= songNotes.length) return;

    const targetNote = songNotes[currentIndex].name;
    const feedback = document.getElementById('check-mark');
    const veloFill = document.getElementById('velocity-fill');
    const veloText = document.getElementById('velo-text');

    // Erősség visszajelzése
    veloText.innerText = velocity;
    veloFill.style.width = (velocity / 127 * 100) + "%";

    if (playedNote === targetNote) {
        // HELYES LEÜTÉS
        feedback.innerText = "✅";
        feedback.style.color = "#2ecc71";
        
        currentIndex++;
        
        // Kis szünet után jöhet a következő hang
        setTimeout(() => {
            feedback.innerText = "";
            if (currentIndex < songNotes.length) {
                updateUI();
                drawStaff(songNotes[currentIndex].name);
            } else {
                document.getElementById('feedback-area').innerHTML = "<b>Gratulálok! 🎉</b>";
            }
        }, 400);
    } else {
        // ROSSZ LEÜTÉS
        feedback.innerText = "❌";
        feedback.style.color = "#e74c3c";
        setTimeout(() => { feedback.innerText = ""; }, 200);
    }
}

// --- 6. SEGÉDFÜGGVÉNYEK ---
function updateUI() {
    const list = document.getElementById('note-sequence');
    list.innerHTML = "";
    
    // Csak a következő 5 hangot mutatjuk a listában
    songNotes.slice(currentIndex, currentIndex + 5).forEach((n, i) => {
        const li = document.createElement('li');
        li.innerText = n.name;
        if (i === 0) li.className = "active-note";
        list.appendChild(li);
    });
}
    </script>
</body>
</html>
